name: bookkeeper
description: A beautiful bookkeeping app with Claude-style UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.0

  # 数据库
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # 路由
  go_router: ^14.0.0

  # UI / 样式
  google_fonts: ^6.0.0
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^10.7.0

  # 图表
  fl_chart: ^0.68.0

  # 数据导出
  csv: ^6.0.0
  excel: ^4.0.0
  share_plus: ^9.0.0

  # 文件选择
  file_picker: ^8.0.0

  # 本地存储
  shared_preferences: ^2.2.0

  # 图片选择
  image_picker: ^1.1.2

  # 工具
  intl: ^0.20.2
  http: ^1.2.0
  collection: ^1.18.0
  universal_io: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
